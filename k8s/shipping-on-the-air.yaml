apiVersion: v1
kind: Namespace
metadata:
  name: shipping-on-the-air
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: shipping-on-the-air
data:
  prometheus.yml: |
    global:
      scrape_interval: 10s

    scrape_configs:
      - job_name: "api-gateway"
        metrics_path: /metrics
        static_configs:
          - targets: ["api-gateway:8080"]

      - job_name: "delivery-service"
        metrics_path: /metrics
        static_configs:
          - targets: ["delivery-service:8080"]

      - job_name: "dronefleet-service"
        metrics_path: /metrics
        static_configs:
          - targets: ["dronefleet-service:8080"]

      - job_name: "payment-service"
        metrics_path: /metrics
        static_configs:
          - targets: ["payment-service:8080"]

      - job_name: "user-service"
        metrics_path: /metrics
        static_configs:
          - targets: ["user-service:8080"]

      - job_name: "notification-service"
        metrics_path: /metrics
        static_configs:
          - targets: ["notification-service:8080"]
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kafka
  namespace: shipping-on-the-air
  labels:
    app: kafka
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kafka
  template:
    metadata:
      labels:
        app: kafka
    spec:
      containers:
        - name: kafka
          image: redpandadata/redpanda:v23.3.18
          imagePullPolicy: IfNotPresent
          command:
            - redpanda
            - start
            - --overprovisioned
            - --smp
            - "1"
            - --memory
            - 1G
            - --reserve-memory
            - 0M
            - --node-id
            - "0"
            - --check=false
            - --kafka-addr
            - PLAINTEXT://0.0.0.0:9092
            - --advertise-kafka-addr
            - PLAINTEXT://kafka:9092
          ports:
            - containerPort: 9092
          resources:
            requests:
              cpu: 100m
              memory: 512Mi
            limits:
              cpu: 500m
              memory: 1Gi
          readinessProbe:
            tcpSocket:
              port: 9092
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: 9092
            initialDelaySeconds: 20
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: kafka
  namespace: shipping-on-the-air
spec:
  selector:
    app: kafka
  ports:
    - name: kafka
      port: 9092
      targetPort: 9092
  type: ClusterIP
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: shipping-on-the-air
  labels:
    app: api-gateway
spec:
  replicas: 2
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
    spec:
      containers:
        - name: api-gateway
          image: api-gateway:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          readinessProbe:
            httpGet:
              path: /internal-health
              port: 8080
            initialDelaySeconds: 20
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /internal-health
              port: 8080
            initialDelaySeconds: 40
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  namespace: shipping-on-the-air
spec:
  selector:
    app: api-gateway
  ports:
    - name: http
      port: 8080
      targetPort: 8080
      nodePort: 30080
  type: NodePort
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: delivery-service
  namespace: shipping-on-the-air
  labels:
    app: delivery-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: delivery-service
  template:
    metadata:
      labels:
        app: delivery-service
    spec:
      containers:
        - name: delivery-service
          image: delivery-service:latest
          imagePullPolicy: IfNotPresent
          env:
            - name: SPRING_KAFKA_BOOTSTRAP_SERVERS
              value: kafka:9092
          ports:
